name: CI — Asador Patagónico

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. Análisis estático y tests unitarios
  # ─────────────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Análisis estático (flutter analyze)
        run: flutter analyze --no-fatal-infos

      - name: Tests unitarios
        run: flutter test --coverage

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # 2. Build Android APK (flavor free)
  # ─────────────────────────────────────────────
  build-android-free:
    name: Build Android Free
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK Free (release)
        run: |
          flutter build apk \
            --flavor free \
            -t lib/main_free.dart \
            --release \
            --no-shrink

      - name: Subir APK Free como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: apk-free-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-free-release.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  # 3. Build Android APK (flavor pro)
  # ─────────────────────────────────────────────
  build-android-pro:
    name: Build Android Pro
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK Pro (release)
        run: |
          flutter build apk \
            --flavor pro \
            -t lib/main_pro.dart \
            --release \
            --no-shrink

      - name: Subir APK Pro como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: apk-pro-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-pro-release.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  # 4. Build iOS (solo en macOS, sin signing)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build iOS Free (sin firma, para verificar compilación)
        run: |
          flutter build ios \
            --flavor free \
            -t lib/main_free.dart \
            --release \
            --no-codesign
