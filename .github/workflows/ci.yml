name: CI — Asador Patagónico

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Secrets requeridos en el repo (Settings → Secrets → Actions):
#
#   KEYSTORE_BASE64      → contenido de asador-patagonico.jks en base64
#   KEYSTORE_PASSWORD    → contraseña del keystore
#   KEY_ALIAS            → alias de la clave (asador)
#   KEY_PASSWORD         → contraseña de la clave

jobs:
  # ─────────────────────────────────────────────
  # 1. Análisis estático y tests unitarios
  # ─────────────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Análisis estático
        run: flutter analyze --no-fatal-infos

      - name: Tests unitarios con cobertura
        run: flutter test --coverage

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # 2. Build APK Free firmado
  # ─────────────────────────────────────────────
  build-android-free:
    name: Build Android Free (signed)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Restaurar keystore desde secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/asador-patagonico.jks

      - name: Crear key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/asador-patagonico.jks
          EOF

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK Free release (firmado)
        run: |
          flutter build apk \
            --flavor free \
            -t lib/main_free.dart \
            --release

      - name: Subir APK Free como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: apk-free-signed-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-free-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # 3. Build APK Pro firmado
  # ─────────────────────────────────────────────
  build-android-pro:
    name: Build Android Pro (signed)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Restaurar keystore desde secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/asador-patagonico.jks

      - name: Crear key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/asador-patagonico.jks
          EOF

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK Pro release (firmado)
        run: |
          flutter build apk \
            --flavor pro \
            -t lib/main_pro.dart \
            --release

      - name: Subir APK Pro como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: apk-pro-signed-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-pro-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # 4. Build iOS (sin firma — requiere Apple cert)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build iOS Free (verificación de compilación)
        run: |
          flutter build ios \
            --flavor free \
            -t lib/main_free.dart \
            --release \
            --no-codesign
